<!DOCTYPE html>
<html lang="vi" class="h-full bg-slate-50 text-slate-900">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hệ thống quản lý phòng trọ chuyên nghiệp - Hỗ trợ quản lý phòng, khách thuê, hợp đồng, hóa đơn và tài sản tối ưu.">
    <title>Quản Lý Phòng Trọ - Hệ Thống Điều Hành</title>

    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Frontend scripts -->
    <script type="module" src="/src/app.js"></script>
    <link rel="stylesheet" href="/src/app.css">
    
    <style>
        /* Bulletproof hover styles bypassing Tailwind build step */
        .room-card-container {
            position: relative;
        }
        .room-actions {
            position: absolute;
            right: 12px;
            top: 12px;
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.15s ease-in-out;
            z-index: 20;
        }
        .room-card-container:hover .room-actions {
            opacity: 1 !important;
        }
        .room-status-badge {
            transition: opacity 0.15s ease-in-out;
        }
        .room-card-container:hover .room-status-badge {
            opacity: 0 !important;
        }
    </style>
</head>
<body class="h-full overflow-hidden flex flex-col">
    <!-- App Container -->
    <div class="flex h-full w-full bg-slate-50 overflow-hidden" 
         x-data="rentalApp()" 
         x-init="initApp()"
         style="display: none;"
         x-show="currentUser">

        <load src="./src/html/sidebar.html" />

        <!-- Main Content Panel -->
        <main class="flex-1 flex flex-col overflow-hidden relative z-10">
            
            <load src="./src/html/header.html" />

            <!-- Dynamic Content Body Container -->
            <div class="flex-1 overflow-y-auto p-8 relative">

                <load src="./src/html/tabs/dashboard.html" />

                <load src="./src/html/tabs/rooms.html" />

                <load src="./src/html/tabs/tenants.html" />

                <load src="./src/html/tabs/contracts.html" />

                <load src="./src/html/tabs/invoices.html" />

                <load src="./src/html/tabs/assets.html" />

            </div>
        </main>

        <!-- ==================== MODALS SYSTEM ==================== -->
        
        <load src="./src/html/modals/room.html" />

        <load src="./src/html/modals/tenant.html" />

        <load src="./src/html/modals/contract.html" />

        <load src="./src/html/modals/invoice.html" />

        <load src="./src/html/modals/asset.html" />

    </div>
</body>
</html>
