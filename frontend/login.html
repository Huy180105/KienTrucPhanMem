<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập – Quản Lý Phòng Trọ</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="/src/app.js"></script>
    <link rel="stylesheet" href="/src/app.css">
    <style>
        body {
            background: #0f0c29;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
        }
        /* Animated blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.25;
            animation: float 8s ease-in-out infinite;
        }
        .blob-1 { width: 500px; height: 500px; background: #6366f1; top: -100px; left: -100px; animation-delay: 0s; }
        .blob-2 { width: 400px; height: 400px; background: #8b5cf6; bottom: -80px; right: -80px; animation-delay: -4s; }
        .blob-3 { width: 300px; height: 300px; background: #06b6d4; top: 40%; left: 60%; animation-delay: -2s; }
        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }
        .card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255,255,255,0.05) inset;
        }
        .logo-icon {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
        }
        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 30px #302b63 inset !important;
            -webkit-text-fill-color: #fff !important;
        }
    </style>
</head>
<body class="min-height-screen flex items-center justify-center p-6 overflow-hidden">
    <!-- Background blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="card" x-data="loginForm()">
        <!-- Logo -->
        <div class="flex flex-col items-center mb-8">
            <div class="logo-icon w-[60px] h-[60px] rounded-2xl flex items-center justify-center mb-4">
                <svg class="w-[30px] h-[30px] text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            </div>
            <h1 class="text-2xl font-extrabold text-white text-center">Quản Lý Phòng Trọ</h1>
            <p class="text-xs text-white/50 mt-1 text-center">Đăng nhập để tiếp tục</p>
        </div>

        <!-- Error Message -->
        <div x-show="errorMessage" class="bg-red-500/12 border border-red-500/30 rounded-xl p-3 mb-5 text-xs text-red-300" x-text="errorMessage" style="display: none;"></div>

        <!-- Login Form -->
        <form @submit.prevent="submitLogin()" autocomplete="off" class="space-y-4">
            <div>
                <label for="email" class="block text-xs font-bold text-white/60 uppercase tracking-wider mb-2">Email</label>
                <div class="relative">
                    <span class="absolute left-4.5 top-1/2 -translate-y-1/2 text-white/30">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                    </span>
                    <input type="email" id="email" x-model="email" placeholder="admin@example.com" required class="w-full pl-11 pr-4 py-3 bg-white/6 border border-white/12 rounded-xl text-sm text-white outline-none focus:border-indigo-500/70 focus:bg-white/9 focus:ring-4 focus:ring-indigo-500/20 transition-all">
                </div>
            </div>

            <div>
                <label for="password" class="block text-xs font-bold text-white/60 uppercase tracking-wider mb-2">Mật khẩu</label>
                <div class="relative">
                    <span class="absolute left-4.5 top-1/2 -translate-y-1/2 text-white/30">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </span>
                    <input :type="showPassword ? 'text' : 'password'" id="password" x-model="password" placeholder="••••••••" required class="w-full pl-11 pr-11 py-3 bg-white/6 border border-white/12 rounded-xl text-sm text-white outline-none focus:border-indigo-500/70 focus:bg-white/9 focus:ring-4 focus:ring-indigo-500/20 transition-all">
                    <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-white/30 hover:text-white/70" @click="showPassword = !showPassword">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>

            <div class="flex items-center gap-2 mb-2">
                <input type="checkbox" id="remember" x-model="remember" class="w-4.5 h-4.5 accent-indigo-500 rounded">
                <label for="remember" class="text-xs font-medium text-white/55">Ghi nhớ đăng nhập</label>
            </div>

            <button type="submit" class="w-full py-3.5 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white rounded-xl text-sm font-bold shadow-lg shadow-indigo-500/35 hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200">
                Đăng nhập &rarr;
            </button>
        </form>

        <p class="text-center text-[10px] text-white/25 mt-8">Hệ thống quản lý phòng trọ nội bộ &bull; v1.0</p>
    </div>

    <script type="module">
        import axios from 'axios';
        window.loginForm = function() {
            return {
                email: '',
                password: '',
                remember: false,
                showPassword: false,
                errorMessage: '',
                submitLogin() {
                    this.errorMessage = '';
                    axios.post('/api/login', {
                        email: this.email,
                        password: this.password,
                        remember: this.remember
                    })
                    .then(res => {
                        if (res.data.success) {
                            window.location.href = '/index.html';
                        }
                    })
                    .catch(err => {
                        this.errorMessage = err.response?.data?.message || 'Đăng nhập thất bại. Vui lòng kiểm tra lại.';
                    });
                }
            }
        }
    </script>
</body>
</html>
